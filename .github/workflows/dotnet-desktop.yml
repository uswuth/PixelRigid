name: Build SharpCorners

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore SharpCorners.csproj

      - name: Build
        run: dotnet build SharpCorners.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish SharpCorners.csproj --configuration Release --output publish --no-build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SharpCorners
          path: publish
